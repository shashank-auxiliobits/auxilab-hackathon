# Local / self-hosted deployment for AP Invoice Intelligence.
#   docker compose up -d            -> Postgres + API + MCP server
#   docker compose up -d postgres   -> just the database (for local dev)
name: ap-invoice-intelligence

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ap_password}
      POSTGRES_DB: ${POSTGRES_DB:-ap_invoice}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ap} -d ${POSTGRES_DB:-ap_invoice}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    command: ["api"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AP_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ap}:${POSTGRES_PASSWORD:-ap_password}@postgres:5432/${POSTGRES_DB:-ap_invoice}
      AP_ENVIRONMENT: ${AP_ENVIRONMENT:-production}
      AP_LOG_JSON: "true"
      AP_API_KEY_PEPPER: ${AP_API_KEY_PEPPER:?set AP_API_KEY_PEPPER in your environment}
      AP_LLM_PROVIDER: ${AP_LLM_PROVIDER:-claude}
      AP_ANTHROPIC_API_KEY: ${AP_ANTHROPIC_API_KEY:-}
      AP_OPENAI_API_KEY: ${AP_OPENAI_API_KEY:-}
      AP_GEMINI_API_KEY: ${AP_GEMINI_API_KEY:-}
      AP_JWT_SECRET: ${AP_JWT_SECRET:?set AP_JWT_SECRET in your environment}
      AP_EMAIL_BACKEND: ${AP_EMAIL_BACKEND:-smtp}
      AP_SMTP_HOST: ${AP_SMTP_HOST:-}
      AP_SMTP_PORT: ${AP_SMTP_PORT:-587}
      AP_SMTP_USERNAME: ${AP_SMTP_USERNAME:-}
      AP_SMTP_PASSWORD: ${AP_SMTP_PASSWORD:-}
    ports:
      - "${AP_API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/live').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  mcp:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    command: ["mcp"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AP_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ap}:${POSTGRES_PASSWORD:-ap_password}@postgres:5432/${POSTGRES_DB:-ap_invoice}
      AP_ENVIRONMENT: ${AP_ENVIRONMENT:-production}
      AP_LOG_JSON: "true"
      AP_API_KEY_PEPPER: ${AP_API_KEY_PEPPER:?set AP_API_KEY_PEPPER in your environment}
      AP_LLM_PROVIDER: ${AP_LLM_PROVIDER:-claude}
      AP_ANTHROPIC_API_KEY: ${AP_ANTHROPIC_API_KEY:-}
      AP_OPENAI_API_KEY: ${AP_OPENAI_API_KEY:-}
      AP_GEMINI_API_KEY: ${AP_GEMINI_API_KEY:-}
      AP_JWT_SECRET: ${AP_JWT_SECRET:?set AP_JWT_SECRET in your environment}
      AP_EMAIL_BACKEND: ${AP_EMAIL_BACKEND:-smtp}
      AP_SMTP_HOST: ${AP_SMTP_HOST:-}
      AP_SMTP_PORT: ${AP_SMTP_PORT:-587}
      AP_SMTP_USERNAME: ${AP_SMTP_USERNAME:-}
      AP_SMTP_PASSWORD: ${AP_SMTP_PASSWORD:-}
      AP_MCP_TRANSPORT: streamable-http
    ports:
      - "${AP_MCP_PORT:-8080}:8080"

volumes:
  postgres-data:
